<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal | Registro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../styles/register.css">
</head>

<body>
  <div class="terminal-container">

    <form class="terminal-form" id="register-form">
      <h2 class="terminal-title">NEW ACCESS PROTOCOL</h2>

      <div class="input-group">
        <div class="input-wrapper">
          <i class="fa-solid fa-fingerprint input-icon"></i>
          <input type="text" id="fullname" placeholder="BIOMETRIA (NOME)..." required autocomplete="off">
        </div>

        <div class="input-wrapper">
          <i class="fa-solid fa-at input-icon"></i>
          <input type="email" id="email" placeholder="SISTEMA_ID (E-MAIL)..." required autocomplete="email">
        </div>

        <div class="input-wrapper">
          <i class="fa-solid fa-microchip input-icon"></i>
          <input type="password" id="password" placeholder="ENCRYPTION_KEY (SENHA)..." required>
        </div>

        <div class="input-wrapper">
          <i class="fa-solid fa-vault input-icon"></i>
          <input type="password" id="confirm-password" placeholder="CONFIRMAR KEY..." required>
        </div>

        <a href="login.html" class="helper-link">JÁ POSSUI CREDENCIAIS? ENTRAR</a>
      </div>

      <button type="submit" class="btn-terminal">INICIAR REGISTRO</button>
    </form>

    <p class="divider">OU ABORTAR COMANDO</p>

    <a href="login.html" class="secondary-action">
      <i class="fa-solid fa-power-off"></i> CANCELAR OPERAÇÃO
    </a>

  </div>

  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  <script src="../scripts/registerValidation.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal | Autenticação</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
  <div class="terminal-container">

    <form class="terminal-form" id="login-form">
      <h2 class="terminal-title">ACCESS TERMINAL</h2>

      <div class="input-group">
        <div class="input-wrapper">
          <i class="fa-solid fa-at input-icon"></i>
          <input type="email" id="email" placeholder="TERMINAL_ID (E-MAIL)..." required autocomplete="email">
        </div>

        <div class="input-wrapper">
          <i class="fa-solid fa-key input-icon"></i>
          <input type="password" id="password" placeholder="ACCESS_KEY (SENHA)..." required>
        </div>

        <a href="#" class="helper-link">ESQUECEU A CHAVE DE ACESSO?</a>
      </div>

      <button type="submit" class="btn-terminal">AUTENTICAR</button>
    </form>

    <p class="divider">NÃO POSSUI PROTOCOLO?</p>

    <a href="register.html" class="secondary-action">
      <i class="fa-solid fa-user-plus"></i> SOLICITAR NOVO REGISTRO
    </a>

  </div>

  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
  <script src="../scripts/loginValidation.js"></script>
</body>

</html>
